<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-touch-fullscreen" content="yes">
<title>Föhrenstraße — Abfahrten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-text">FÖHRENSTRASSE</span>
        <span class="brand-sub">Richtung Stadt</span>
      </div>

      <div class="weather" id="weather">
        <span class="weather-icon" id="weatherIcon">—</span>
        <span class="weather-temp-block">
          <span class="weather-temp" id="weatherTemp">–°</span>
          <span class="weather-minmax" id="weatherMinMax">–° / –°</span>
        </span>
      </div>

      <div class="clock">
        <span class="clock-time" id="clockTime">--:--</span>
        <span class="clock-date" id="clockDate">--</span>
      </div>
    </header>

    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

    <main class="stage" id="stage">

      <section class="panel-view active" id="panel-departures">
        <div class="board">
          <div class="board-head">
            <span class="col-line">Linie</span>
            <span class="col-dest">Ziel</span>
            <span class="col-time">Abfahrt</span>
          </div>
          <div class="board-rows" id="departureRows">
            <div class="row placeholder">Lade Abfahrten…</div>
          </div>
        </div>
      </section>

      <section class="panel-view" id="panel-weather">
        <div class="view-label">Wetter heute</div>
        <div class="weather-big" id="weatherBig">
          <span class="weather-big-icon" id="weatherBigIcon">—</span>
          <span class="weather-big-temp" id="weatherBigTemp">–°</span>
          <span class="weather-big-desc" id="weatherBigDesc">Lädt…</span>
        </div>
        <div class="weather-hours" id="weatherHours"></div>
      </section>

      <section class="panel-view" id="panel-news">
        <div class="view-label">Nachrichten — Bremen</div>
        <div class="news-list" id="newsList">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

      <section class="panel-view" id="panel-music">
        <div class="view-label">Musik-Charts Deutschland</div>
        <div class="music-list" id="musicList">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

      <section class="panel-view" id="panel-quote">
        <div class="view-label">Spruch des Tages</div>
        <div class="quote-block" id="quoteBlock">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

    </main>

    <footer class="statusbar">
      <span id="statusText">Verbinde…</span>
      <span id="lastUpdate"></span>
      <span>Daten: Transitous, Apple, Advice Slip, Tagesschau</span>
    </footer>
  </div>

  <script src="config.js?v=11"></script>
  <script src="app.js?v=11"></script>
</body>
</html>
