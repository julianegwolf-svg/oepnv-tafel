<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-touch-fullscreen" content="yes">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Föhrenstraße — Abfahrten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="style.css?v=32">
</head>
<body>
  <div class="panel">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-text">ALTER POSTWEG 110</span>
      </div>

      <div class="greeting" id="greeting">
        <span class="greeting-text" id="greetingText">Moin!</span>
      </div>

      <div class="clock">
        <span class="clock-time" id="clockTime">--:--</span>
        <span class="clock-date" id="clockDate">--</span>
      </div>
    </header>

    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

    <main class="stage" id="stage">

      <section class="panel-view active" id="panel-departures">
        <div class="board">
          <div class="board-head">
            <span class="col-line">Linie</span>
            <span class="col-dest">Ziel</span>
            <span class="col-time">Abfahrt</span>
          </div>
          <div class="board-rows" id="departureRows">
            <div class="row placeholder">Lade Abfahrten…</div>
          </div>
        </div>
      </section>

      <section class="panel-view" id="panel-commute">
        <div class="view-label">Arbeitsweg — Max Müller GmbH</div>
        <div class="commute-chips" id="commuteChips">
          <div class="view-placeholder">Lädt…</div>
        </div>
        <div class="commute-map-wrap">
          <div class="commute-map" id="commuteMap"></div>
        </div>
      </section>

      <section class="panel-view" id="panel-weather">
        <div class="weather-sky" id="weatherSky"></div>
        <div class="view-label">Wetter heute</div>
        <div class="weather-big" id="weatherBig">
          <span class="weather-big-icon" id="weatherBigIcon">—</span>
          <span class="weather-big-temp" id="weatherBigTemp">–°</span>
          <span class="weather-big-desc" id="weatherBigDesc">Lädt…</span>
        </div>
        <div class="weather-hours" id="weatherHours"></div>
        <div class="weather-details" id="weatherDetails"></div>
      </section>

      <section class="panel-view" id="panel-news">
        <div class="view-label">Nachrichten — Bremen</div>
        <div class="news-slideshow" id="newsList">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

      <section class="panel-view" id="panel-music">
        <div class="view-label">Musik-Charts Deutschland</div>
        <div class="music-list" id="musicList">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

      <section class="panel-view" id="panel-quote">
        <div class="view-label">Spruch des Tages</div>
        <div class="quote-block" id="quoteBlock">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

      <section class="panel-view" id="panel-sport">
        <div class="view-label">Fußball</div>
        <div class="sport-block" id="sportBlock">
          <div class="view-placeholder">Lädt…</div>
        </div>
      </section>

    </main>

    <footer class="statusbar">
      <span id="statusText">Verbinde…</span>
      <span id="lastUpdate"></span>
      <span id="wasteLine" class="waste-line"></span>
      <span>Daten: Transitous, Apple, Advice Slip, Tagesschau</span>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="config.js?v=32"></script>
  <script src="app.js?v=32"></script>
</body>
</html>
