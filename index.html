<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-touch-fullscreen" content="yes">
<title>Föhrenstraße — Abfahrten</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://fahrplaner.vbn.de/fahrplan/staticfiles/hafas-widget-core.1.0.0.js?language=de_DE&L=vs_vbn"></script>
</head>
<body>
  <div class="panel">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-text">FÖHRENSTRASSE</span>
        <span class="brand-sub">Richtung Stadt</span>
      </div>

      <div class="weather" id="weather">
        <span class="weather-icon" id="weatherIcon">—</span>
        <span class="weather-temp" id="weatherTemp">–°</span>
      </div>

      <div class="clock">
        <span class="clock-time" id="clockTime">--:--</span>
        <span class="clock-date" id="clockDate">--</span>
      </div>
    </header>

    <main class="board-wrap">
      <div
        data-hfs-widget="true"
        data-hfs-widget-cfg-colorscheme="dark"
        data-hfs-widget-sq="true"
        data-hfs-widget-sq-displaymode="results"
        data-hfs-widget-sq-location="A=1@O=Bremen Föhrenstraße@X=8877297@Y=53064313@U=80@L=9013884@p=1784333522@"
        data-hfs-widget-sq-locationname="Bremen Föhrenstraße"
      ></div>
    </main>

    <footer class="statusbar">
      <span>VBN FahrPlaner — offizielle Live-Daten</span>
      <span id="lastUpdate"></span>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
